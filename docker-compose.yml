# ╔════════════════════════════════════════════════════════════════════════════════╗
# ║           🧪 PROJET APPRENTI TESTEUR - Docker Compose Setup                   ║
# ║     Squash TM (Test Management) + Mantis BT (Bug Tracking) + MariaDB          ║
# ║                                                                                ║
# ║ Ce fichier décrit l'infrastructure complète pour débuter avec les outils       ║
# ║ professionnels de gestion des tests et suivi des anomalies.                    ║
# ║                                                                                ║
# ║ Version: 1.0                                                                   ║
# ║ Squash TM: 8.1.3 (dernière version stable - Mai 2025)                         ║
# ║ Mantis BT: 2.25.2 (dernière version stable)                                    ║
# ║ MariaDB: 11.4 (LTS - dernière version compatible)                              ║
# ╚════════════════════════════════════════════════════════════════════════════════╝

# ═══════════════════════════════════════════════════════════════════════════════
# 📋 SECTIONS PRINCIPALES
# ═══════════════════════════════════════════════════════════════════════════════
# 1. SERVICES       → Les applications et bases de données à lancer
# 2. VOLUMES        → Les espaces de stockage persistants
# 3. NETWORKS       → Les réseaux de communication entre conteneurs
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🎯 SQUASH TM - Gestion des Tests (Test Management)                        ║
  # ║                                                                            ║
  # ║  Port d'accès: http://localhost:8080                                      ║
  # ║  Login par défaut: admin / admin                                          ║
  # ║                                                                            ║
  # ║  Squash TM est la pierre angulaire de votre activité de testeur:           ║
  # ║  - Gérer les exigences (requirements)                                      ║
  # ║  - Créer et documenter les cas de test                                    ║
  # ║  - Organiser les campagnes d'exécution                                     ║
  # ║  - Suivre les résultats des tests (pass/fail)                              ║
  # ║  - Lier vos anomalies découvertes à Mantis BT                              ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  squash-tm:
    # Image Docker: squashtest/squash-tm
    # Cette image contient Squash TM avec toutes ses dépendances
    # Les tags de version correspondent aux releases officielles
    image: squashtest/squash:latest
    container_name: squash-tm
    
    # Numéro de conteneur (aidé à identifier rapidement le service)
    hostname: squash-tm
    
    # Ports exposés: [PORT_LOCAL]:[PORT_CONTENEUR]
    # 8080 sur votre machine → 8080 dans le conteneur
    # Accessible via http://localhost:8080
    ports:
      - "8080:8080"
    
    # Variables d'environnement de configuration
    environment:
      # Configuration de la base de données (MariaDB)
      # Squash TM communique avec MariaDB pour stocker:
      # - Les exigences, cas de test, campagnes
      # - Les résultats d'exécution
      # - Les utilisateurs et leurs droits d'accès
      SQTM_DB_HOST: mariadb-squash        # Nom du service MariaDB (DNS interne Docker)
      SQTM_DB_PORT: 3306                  # Port standard MySQL/MariaDB
      SQTM_DB_NAME: squashdb              # Nom de la base de données
      SQTM_DB_USERNAME: squash_user           # Utilisateur pour se connecter
      SQTM_DB_PASSWORD: squash_password   # Mot de passe (À CHANGER EN PRODUCTION!)
      SQTM_DB_TYPE: mariadb
      
      # Configuration du serveur Squash
      SQUASHTM_PORT: 8080                  # Port d'écoute du service web
      
      # Fuseau horaire (important pour les timestamps de test)
      TZ: Europe/Paris
      LANG: fr_FR.UTF-8
    
    # Dépendances de services
    # Squash TM attendra que MariaDB soit prêt avant de démarrer
    depends_on:
      - mariadb-squash
    
    # Volumes: liaison entre le système de fichiers local et le conteneur
    # Syntaxe: [CHEMIN_LOCAL]:[CHEMIN_CONTENEUR]:[OPTIONS]
    # Permet de:
    # - Conserver les données après l'arrêt du conteneur
    # - Modifier les configurations
    # - Accéder aux logs pour déboguer
    volumes:
      # Répertoire de configuration Squash TM
      # Pour des configurations avancées ou connexions externes (Jira, TFS, etc.)
      - ./squash-tm/config:/opt/squashtm/config
      
      # Répertoire des logs d'application
      # Utile pour comprendre les erreurs ou suivre l'activité
      - ./squash-tm/logs:/opt/squashtm/logs
      
      # Répertoire des attachements (fichiers joints aux cas de test)
      - ./squash-tm/attachments:/opt/squashtm/data/attachments
    
    # Politique de redémarrage
    # - always: redémarre toujours le conteneur s'il s'arrête
    # - unless-stopped: redémarre sauf si l'utilisateur l'a arrêté manuellement
    # - on-failure: redémarre seulement en cas d'erreur
    restart: unless-stopped
    
    # Réseau utilisé pour la communication avec les autres services
    networks:
      - testlab-network
    
    # Étiquettes (metadata) pour identifier le conteneur
    labels:
      description: "Squash TM - Gestion centralisée des tests et exigences"
      version: "8.1.3"
      role: "Test Management"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  🐛 MANTIS BT - Suivi des Anomalies (Bug Tracking)                         ║
  # ║                                                                            ║
  # ║  Port d'accès: http://localhost:8989                                      ║
  # ║  Identifiants par défaut: administrator / root                            ║
  # ║                                                                            ║
  # ║  Mantis BT est votre outil de signalement des anomalies:                   ║
  # ║  - Reporter les bugs trouvés lors du test                                  ║
  # ║  - Tracer l'évolution des corrections                                      ║
  # ║  - Communiquer avec les développeurs                                       ║
  # ║  - Lier directement vos anomalies aux cas de test dans Squash TM           ║
  # ║  - Générer des rapports d'activité                                         ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  mantis-bt:
    # Image Docker officielle de Mantis BT
    # Fournie par xlrl (maintenu régulièrement)
    # Inclut Apache, PHP et toutes les extensions nécessaires
    image: xlrl/mantisbt:latest
    container_name: mantis-bt
    
    # Port d'accès
    ports:
      - "8989:80"
    
    # Configuration d'environnement
    environment:
      # Fuseau horaire pour les timestamps des rapports
      MANTIS_TIMEZONE: Europe/Paris
      
      # IMPORTANT: Activer le panneau d'administration
      # MANTIS_ENABLE_ADMIN=1 → Permet d'accéder à http://localhost:8989/admin
      # Utile pour les configurations initiales et les mises à jour
      # À mettre à 0 en production pour des raisons de sécurité
      MANTIS_ENABLE_ADMIN: 1
      
      TZ: Europe/Paris
      LANG: fr_FR.UTF-8
    
    # Dépendances de services
    # Mantis ne peut pas démarrer sans MariaDB disponible
    depends_on:
      - mariadb-mantis
    
    # Volumes pour la persistance des données
    volumes:
      # Configuration de Mantis (authentification, email, etc.)
      # Montage dans le répertoire config du conteneur
      - ./mantis/config:/var/www/html/config
      
      # Extensions/plugins personnalisés
      - ./mantis/plugins:/var/www/html/plugins
      
      # Fichiers personnalisés (templates, styles)
      - ./mantis/custom:/var/www/html/custom
      
      # Logs d'Apache (utiles pour déboguer)
      - ./mantis/logs:/var/log/apache2
    
    # Redémarrage automatique
    restart: unless-stopped
    
    # Réseau de communication
    networks:
      - testlab-network
    
    # Métadonnées
    labels:
      description: "Mantis BT - Suivi des anomalies et bugs découverts"
      version: "2.25.2"
      role: "Bug Tracking"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  📊 MariaDB SQUASH - Base de données pour Squash TM                        ║
  # ║                                                                            ║
  # ║  Port d'accès: localhost:3306 (depuis l'intérieur de Docker uniquement)   ║
  # ║  Utilisation: Stockage persistant des données de test                      ║
  # ║                                                                            ║
  # ║  Note: Séparation intentionnelle des bases de données pour:                ║
  # ║  - Isolation des données entre Squash et Mantis                            ║
  # ║  - Performance optimale (charge répartie)                                  ║
  # ║  - Gestion des backups indépendante                                        ║
  # ║  - Éviter les conflits de schéma                                           ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  mariadb-squash:
    # Version LTS de MariaDB (Long Term Support)
    # 11.4 offre la meilleure compatibilité et stabilité
    image: mariadb:10.11
    container_name: mariadb-squash
    
    # Important: Ne pas exposer le port MariaDB sur votre machine
    # Les autres conteneurs communiquent via le réseau interne Docker
    # Pour des raisons de sécurité, la base de données n'est pas accessible depuis l'extérieur
    
    # Configuration de MariaDB
    environment:
      # Variables MySQL standard pour initialisation
      MARIADB_DATABASE: squashdb
      MARIADB_USER: squash_user
      MARIADB_PASSWORD: squash_password
      MARIADB_ROOT_PASSWORD: root
      
      # Encodage UTF-8 pour les caractères spéciaux (français, accents)
      MARIADB_INITDB_SKIP_TZINFO: 'yes'
      
      TZ: Europe/Paris
    
    # Commande de démarrage avec optimisations
    # --character-set-server=utf8mb4: Support complet des caractères UTF-8
    # --collation-server=utf8mb4_unicode_ci: Collation Unicode pour les comparaisons
    # --max_connections=100: Nombre max de connexions simultanées
    # --log-bin: Active la réplication (utile pour les backups)
    command: [
      'mysqld',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--max_connections=100',
      '--log-bin=mysql-bin',
      '--binlog_format=mixed'
    ]
    
    # Persistance des données
    # Critique: Garantit que vos données de test persistent même après redémarrage
    volumes:
      # Données de la base de données
      - mariadb-squash-data:/var/lib/mysql
      
      # Fichiers d'initialisation personnalisés (optionnel)
      - ./mariadb/squash-init:/docker-entrypoint-initdb.d
      
      # Logs MySQL pour l'analyse des problèmes
      - ./mariadb/squash-logs:/var/log/mysql
    
    # Mode de redémarrage
    restart: unless-stopped
    
    # Réseau interne
    networks:
      - testlab-network
    
    # Limites de ressources (à adapter selon votre machine)
    # Évite que MariaDB consomme toute la mémoire de votre PC/Mac
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    labels:
      description: "Base de données MariaDB pour Squash TM"
      version: "11.4"

  # ╔════════════════════════════════════════════════════════════════════════════╗
  # ║  📊 MariaDB MANTIS - Base de données pour Mantis BT                        ║
  # ║                                                                            ║
  # ║  Port d'accès: localhost:3306 (depuis l'intérieur de Docker uniquement)   ║
  # ║                                                                            ║
  # ║  Stockage indépendant pour Mantis BT                                       ║
  # ║  (Voir notes au-dessus)                                                    ║
  # ╚════════════════════════════════════════════════════════════════════════════╝
  mariadb-mantis:
    image: mariadb:10.11
    container_name: mariadb-mantis
    
    environment:
      MARIADB_DATABASE: bugtracker
      MARIADB_USER: mantisbt
      MARIADB_PASSWORD: mantisbt
      MARIADB_ROOT_PASSWORD: root
      MARIADB_INITDB_SKIP_TZINFO: 'yes'
      TZ: Europe/Paris
    
    # Optimisations identiques à Squash TM
    command: [
      'mysqld',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--max_connections=100',
      '--log-bin=mysql-bin',
      '--binlog_format=mixed'
    ]
    
    # Données persistantes
    volumes:
      - mariadb-mantis-data:/var/lib/mysql
      - ./mariadb/mantis-init:/docker-entrypoint-initdb.d
      - ./mariadb/mantis-logs:/var/log/mysql
    
    restart: unless-stopped
    
    networks:
      - testlab-network
    
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    
    labels:
      description: "Base de données MariaDB pour Mantis BT"
      version: "11.4"

# ═══════════════════════════════════════════════════════════════════════════════
# 💾 VOLUMES NOMMÉS - Stockage Persistant
# ═══════════════════════════════════════════════════════════════════════════════
# 
# Les volumes nommés (vs les montages de répertoires) offrent:
# - Gestion centralisée par Docker
# - Meilleure performance
# - Portabilité (utilisation entre projets)
# - Backups facilités
#
# Localisation sur votre système:
#   Linux/Mac:   ~/.docker/volumes/
#   Windows:     C:\ProgramData\Docker\volumes\
#
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  # Volume pour données MariaDB Squash TM
  mariadb-squash-data:
    driver: local
    labels:
      description: "Données persistantes de la base Squash TM"
  
  # Volume pour données MariaDB Mantis BT
  mariadb-mantis-data:
    driver: local
    labels:
      description: "Données persistantes de la base Mantis BT"

# ═══════════════════════════════════════════════════════════════════════════════
# 🌐 RÉSEAUX - Communication entre Conteneurs
# ═══════════════════════════════════════════════════════════════════════════════
#
# Docker crée un réseau interne pour isoler et sécuriser les communications
# Les conteneurs peuvent se parler par leurs noms de service (DNS automatique)
#
# Exemple de communication:
#   - Squash TM contacte MariaDB via le nom: mariadb-squash:3306
#   - Mantis BT contacte MariaDB via le nom: mariadb-mantis:3306
#   - Pas besoin d'adresses IP fixes!
#
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  # Réseau bridge nommé (spécifique à ce projet)
  # Crée l'isolation nécessaire pour la sécurité
  testlab-network:
    driver: bridge
    driver_opts:
      # Réduction du MTU pour meilleure compatibilité
      com.docker.network.driver.mtu: 1450
    labels:
      description: "Réseau interne pour TestLab"
      environment: "development"

# ═══════════════════════════════════════════════════════════════════════════════
# 📝 NOTES IMPORTANTES
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. PREMIÈRES EXÉCUTIONS:
#    - Les bases de données mettent 30-60 secondes à initialiser
#    - Attendez que les logs affichent "ready for connections"
#    - Accédez aux applications seulement après
#
# 2. IDENTIFIANTS DE CONNEXION:
#    Squash TM: admin / admin (À changer après première connexion!)
#    Mantis BT: administrator / root (À changer après première connexion!)
#
# 3. MODIFICATION DES MOTS DE PASSE:
#    Changez les variables d'environnement, puis:
#      docker-compose down
#      docker volume rm testlab_mariadb-squash-data testlab_mariadb-mantis-data
#      docker-compose up -d
#    ⚠️  Cette action SUPPRIME les données! Faites un backup d'abord!
#
# 4. PERFORMANCE:
#    - Si lent: augmentez les ressources Docker (Preferences → Resources)
#    - Minimum recommandé: 4GB RAM, 2 cores
#
# 5. DÉPANNAGE:
#    Consulter les logs:
#      docker-compose logs squash-tm
#      docker-compose logs mantis-bt
#      docker-compose logs mariadb-squash
#    
#    Entrer dans un conteneur:
#      docker-compose exec squash-tm bash
#      docker-compose exec mariadb-squash bash
#
# 6. SAUVEGARDES:
#    Faire un backup de MariaDB:
#      docker exec mariadb-squash mysqldump -u root -proot squashdb > backup_squash.sql
#      docker exec mariadb-mantis mysqldump -u root -proot bugtracker > backup_mantis.sql
#
# ═══════════════════════════════════════════════════════════════════════════════
